  <mat-paginator [length]="totalCount()"
              [pageSize]="pageSize()"
              [pageIndex]="pageNumber()-1"
              (page)="onPageChange($event)"
              [showFirstLastButtons]="true"
              [pageSizeOptions]="[5, 10, 25, 100]"
              aria-label="Select page">
  </mat-paginator>
